<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Task Tracker R&D — Version ສົມບູນ</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root{ --bg:#f0ede8; --surface:#faf9f6; --card:#fff; --border:#dedad3; --accent:#2d6a4f; --accent-lt:#e8f5ee; --r:10px; }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Noto Sans Lao',sans-serif; background:var(--bg); color:#1c1a17; font-size:13px;}
  .header{background:var(--card); border-bottom:1px solid var(--border); padding:10px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100;}
  .sync-bar{display:flex; padding:5px 24px; background:var(--surface); border-bottom:1px solid var(--border); font-size:11px; color:#7a7670;}
  .sync-dot{width:8px; height:8px; border-radius:50%; margin-right:6px; background:#ccc;}
  .sync-dot.ok{background:#3b6d11;}
  .sync-dot.loading{background:#854f0b; animation:blink 1s infinite;}
  @keyframes blink{50%{opacity:0.3;}}
  .main{max-width:1200px; margin:0 auto; padding:20px;}
  .stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-bottom:15px;}
  .stat-card{background:var(--card); border-radius:var(--r); padding:15px; border:1px solid var(--border); text-align:center;}
  .chart-container{background:var(--card); border-radius:var(--r); padding:20px; border:1px solid var(--border); margin-bottom:15px; height:320px;}
  .prog-row{display:flex; align-items:center; gap:10px; margin-bottom:15px;}
  .prog-bar{flex:1; height:6px; background:#ddd; border-radius:10px; overflow:hidden;}
  .prog-fill{height:100%; background:var(--accent); transition:0.4s;}
  .form-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:10px; background:var(--card); padding:15px; border-radius:var(--r); border:1px solid var(--border); margin-bottom:15px; align-items:end;}
  .fg{display:flex; flex-direction:column; gap:4px;}
  .fg label{font-size:11px; font-weight:600; color:#7a7670;}
  .fg input, .fg select{padding:8px; border:1px solid var(--border); border-radius:8px; outline:none; height:36px;}
  .toolbar{display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:15px;}
  .search-box input{padding:8px 12px; border:1px solid var(--border); border-radius:8px; width:220px;}
  .fp{padding:5px 12px; border:1px solid var(--border); border-radius:999px; font-size:11px; cursor:pointer; background:var(--card);}
  .fp.on{background:var(--accent); color:#fff; border-color:var(--accent);}
  .btn{padding:7px 12px; border-radius:8px; border:1px solid var(--border); cursor:pointer; font-size:12px; display:inline-flex; align-items:center; gap:4px;}
  .btn-accent{background:var(--accent); color:#fff; border:none;}
  .btn-go{background:var(--accent-lt); color:var(--accent); border-color:#95d5b2;}
  .btn-wa{background:#25D366; color:#fff; border:none;}
  .btn-danger{background:#fff5f5; color:#9b2323; border-color:#fbc8c8;}
  table{width:100%; border-collapse:collapse; background:var(--card); border-radius:var(--r); overflow:hidden;}
  th{background:var(--surface); padding:12px; text-align:left; font-size:11px; color:#7a7670; border-bottom:1px solid var(--border);}
  td{padding:12px; border-bottom:1px solid var(--border); vertical-align:middle;}
  .badge{padding:3px 8px; border-radius:999px; font-size:10px; font-weight:600;}
  .b-todo{background:#eef4fb; color:#1a4d8f;}
  .b-doing{background:#fef5e7; color:#7a4f0a;}
  .b-done{background:var(--accent-lt); color:var(--accent);}
  .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#000; color:#fff; padding:10px 20px; border-radius:10px; opacity:0; transition:0.3s; z-index:1000;}
  .toast.show{opacity:1;}
</style>
</head>
<body>

<header class="header">
  <div style="display:flex; align-items:center; gap:10px;">
    <span style="font-size:24px;">🚀</span>
    <b>ກະດານຕິດຕາມວຽກ R&D</b>
  </div>
  <button class="btn" onclick="loadFromSheet()">🔄 ໂຫຼດໃໝ່</button>
</header>

<div class="sync-bar">
  <div class="sync-dot" id="sync-dot"></div>
  <span id="sync-text">ລໍຖ້າການເຊື່ອມຕໍ່...</span>
  <span id="sync-time" style="margin-left:auto;"></span>
</div>

<main class="main">
  <div class="stats" id="stats-grid"></div>
  <div class="prog-row">
    <span style="font-size:11px; color:#7a7670;">ຄວາມຄືບໜ້າລວມ</span>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <span id="prog-pct" style="font-size:11px; font-weight:600;">0%</span>
  </div>

  <div class="chart-container"><canvas id="performanceChart"></canvas></div>

  <div class="form-grid">
    <div class="fg"><label>ຊື່ວຽກ *</label><input id="fName" placeholder="ພິມຊື່ວຽກ..."/></div>
    <div class="fg"><label>ຜູ້ຮັບຜິດຊອບ</label><select id="fAssign"><option value="ບໍ່ລະບຸ">-- ເລືອກຜູ້ຮັບຜິດຊອບ --</option></select></div>
    <div class="fg"><label>ວັນທີມອບວຽກ</label><input id="fAssigned" type="date"/></div>
    <div class="fg"><label>ກຳນົດສຳເລັດ</label><input id="fDue" type="date"/></div>
    <div class="fg"><label>ຄວາມສຳຄັນ</label>
      <select id="fPrio">
        <option value="h">ຮີບດ່ວນ</option>
        <option value="m" selected>ປານກາງ</option>
        <option value="l">ຕໍ່າ</option>
      </select>
    </div>
    <button class="btn btn-accent" onclick="addTask()">+ ເພີ່ມວຽກ</button>
  </div>

  <div class="toolbar">
    <div class="search-box"><input type="text" id="searchInput" oninput="render()" placeholder="🔍 ຄົ້ນຫາ..."/></div>
    <div id="statusFilters" style="display:flex; gap:6px;"></div>
  </div>

  <div style="overflow-x:auto;">
    <table>
      <thead>
        <tr>
          <th>#</th><th>ຊື່ວຽກ</th><th>ຜູ້ຮັບຜິດຊອບ</th><th>ວັນທີມອບ</th><th>ກຳນົດສົ່ງ</th><th>ສຳເລັດແທ້</th><th>ຄວາມສຳຄັນ</th><th>ສະຖານະ</th><th>ຈັດການ</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyRX3NSAotb7Zjh5ESN4cDpj79mKW2EHyuE68cdiqvuzZeqjduvy4PKAL-Qx6h9Gp0c/exec";
let tasks = [], users = [], filterSt = 'all', myChart = null;

// Logic ເກົ່າທີ່ເຈົ້າມັກ: Cycle Status
const ST_NEXT  = { todo: 'doing', doing: 'done', done: 'todo' };
const ST_LABEL = { todo: 'ລໍຖ້າ', doing: 'ດຳເນີນຢູ່', done: 'ສຳເລັດ' };
const ST_CLS   = { todo: 'b-todo', doing: 'b-doing', done: 'b-done' };
const MV_LBL   = { todo: '▶ ເລີ່ມ', doing: '✓ ສຳເລັດ', done: '↺ ຣີເຊັດ' };
const MV_CLS   = { todo: 'btn-go', doing: 'btn-accent', done: '' };
const PRIO_LABEL = { h: '🔥 ຮີບດ່ວນ', m: '⚡ ປານກາງ', l: '💤 ຕໍ່າ' };

async function loadFromSheet() {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot loading';
  try {
    const res = await fetch(SCRIPT_URL + "?t=" + Date.now(), { redirect: 'follow' });
    const data = await res.json();
    tasks = data.tasks.map(t => ({...t, id: Number(t.id)})).filter(t => t.name);
    users = data.users;

    const select = document.getElementById('fAssign');
    select.innerHTML = '<option value="ບໍ່ລະບຸ">-- ເລືອກຜູ້ຮັບຜິດຊອບ --</option>';
    users.forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.name; opt.textContent = u.name;
      select.appendChild(opt);
    });

    dot.className = 'sync-dot ok';
    document.getElementById('sync-text').textContent = "Sync ສຳເລັດ";
    document.getElementById('sync-time').textContent = new Date().toLocaleTimeString('lo-LA');
    render();
  } catch(e) { dot.className = 'sync-dot err'; }
}

function fmtDate(d) {
  if (!d || d === '—' || d === 'Invalid Date') return '—';
  const dateStr = String(d).split('T')[0];
  const p = dateStr.split('-');
  return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : d;
}

function updateChart() {
  const ctx = document.getElementById('performanceChart').getContext('2d');
  const userList = [...new Set(tasks.map(t => t.assignee))];
  const done = userList.map(u => tasks.filter(t => t.assignee === u && t.status === 'done').length);
  const pending = userList.map(u => tasks.filter(t => t.assignee === u && t.status !== 'done').length);
  if(myChart) myChart.destroy();
  myChart = new Chart(ctx, {
    type: 'bar', data: { labels: userList, datasets: [
      { label: 'ວຽກຄ້າງ', data: pending, backgroundColor: '#f5d08a' },
      { label: 'ວຽກສຳເລັດ', data: done, backgroundColor: '#2d6a4f' }
    ]}, options: { responsive: true, maintainAspectRatio: false, scales: { x: {stacked: true}, y: {stacked: true} } }
  });
}

function sendWA(id) {
  const t = tasks.find(x => x.id == id);
  const assignee = String(t.assignee || "").trim();
  const cleanAssignee = assignee.replace(/\s+/g, '');
  const u = users.find(x => String(x.name || "").replace(/\s+/g, '').trim() === cleanAssignee);
  if (!u || !u.phone) return alert("ບໍ່ພົບເບີ WhatsApp ໃນ Sheet2");
  const msg = `ສະບາຍດີ ${assignee},\nທ່ານມີວຽກໃໝ່:\n📌 ວຽກ: ${t.name}\n📅 Deadline: ${fmtDate(t.due)}`;
  window.open(`https://wa.me/${u.phone}?text=${encodeURIComponent(msg)}`, '_blank');
}

function render() {
  updateChart();
  const q = document.getElementById('searchInput').value.toLowerCase();
  
  // Stats & Progress
  const tot = tasks.length, dn = tasks.filter(t => t.status === 'done').length;
  const pct = tot ? Math.round((dn / tot) * 100) : 0;
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><b>${tot}</b><p>ວຽກທັງໝົດ</p></div>
    <div class="stat-card" style="color:#7a4f0a"><b>${tasks.filter(t=>t.status==='doing').length}</b><p>ກຳລັງເຮັດ</p></div>
    <div class="stat-card" style="color:var(--accent)"><b>${dn}</b><p>ສຳເລັດ</p></div>`;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';

  // Filters UI
  const stFilters = [['all','ທັງໝົດ'], ['todo','ລໍຖ້າ'], ['doing','ດຳເນີນ'], ['done','ສຳເລັດ']];
  document.getElementById('statusFilters').innerHTML = stFilters.map(([f,l]) => 
    `<button class="fp${filterSt===f?' on':''}" onclick="filterSt='${f}';render()">${l}</button>`).join('');

  document.getElementById('tbody').innerHTML = tasks
    .filter(t => (filterSt === 'all' || t.status === filterSt) && (t.name.toLowerCase().includes(q) || t.assignee.toLowerCase().includes(q)))
    .map((t, i) => `
    <tr>
      <td>${i+1}</td>
      <td><b>${t.name}</b></td>
      <td>${t.assignee}</td>
      <td>${fmtDate(t.assigned)}</td>
      <td>${fmtDate(t.due)}</td>
      <td style="color:var(--accent)">${fmtDate(t.completed_at)}</td>
      <td><span class="badge">${PRIO_LABEL[t.prio] || t.prio}</span></td>
      <td><span class="badge ${ST_CLS[t.status]}">${ST_LABEL[t.status]}</span></td>
      <td style="display:flex; gap:4px;">
        <button class="btn btn-sm ${MV_CLS[t.status]}" onclick="moveTask(${t.id})">${MV_LBL[t.status]}</button>
        <button class="btn btn-sm btn-wa" onclick="sendWA(${t.id})">WA</button>
        <button class="btn btn-sm btn-danger" onclick="delTask(${t.id})">ລຶບ</button>
      </td>
    </tr>`).join('');
}

async function moveTask(id) {
  const t = tasks.find(x => x.id == id);
  const next = ST_NEXT[t.status];
  t.status = next;
  t.completed_at = next === 'done' ? new Date().toISOString().split('T')[0] : (next === 'todo' ? '' : t.completed_at);
  render(); await saveToSheet();
}

async function addTask() {
  const nameEl = document.getElementById('fName');
  const assignEl = document.getElementById('fAssign');
  const assignedEl = document.getElementById('fAssigned');
  const dueEl = document.getElementById('fDue');
  const prioEl = document.getElementById('fPrio');

  const name = nameEl.value.trim();
  if(!name) return showToast("ໃສ່ຊື່ວຽກກ່ອນ!");

  // ເພີ່ມຂໍ້ມູນເຂົ້າໃນ Array tasks
  tasks.push({ 
    id: Date.now(), 
    name, 
    assignee: assignEl.value, 
    assigned: assignedEl.value, 
    due: dueEl.value, 
    completed_at: '', 
    prio: prioEl.value, 
    status: 'todo' 
  });

  // ສະແດງຜົນ ແລະ ບັນທຶກລົງ Sheet
  render(); 
  await saveToSheet(); 

  // --- ສ່ວນທີ່ເພີ່ມໃໝ່: ລ້າງຂໍ້ມູນໃນຊ່ອງປ້ອນອອກໃຫ້ໝົດ ---
  nameEl.value = '';        // ລ້າງຊື່ວຽກ
  assignEl.value = 'ບໍ່ລະບຸ'; // Reset ຜູ້ຮັບຜິດຊອບເປັນຄ່າເລີ່ມຕົ້ນ
  assignedEl.value = '';    // ລ້າງວັນທີມອບ
  dueEl.value = '';         // ລ້າງວັນທີກຳນົດ
  prioEl.value = 'm';       // Reset ຄວາມສຳຄັນເປັນ "ປານກາງ"
  
  showToast("ເພີ່ມວຽກສຳເລັດແລ້ວ!");
}

async function delTask(id) {
  if(!confirm("ລຶບແທ້ບໍ?")) return;
  tasks = tasks.filter(t => t.id != id);
  render(); await saveToSheet();
}

async function saveToSheet() {
  await fetch(SCRIPT_URL, { method: 'POST', redirect: 'follow', body: JSON.stringify(tasks) });
  showToast("Sync ສຳເລັດ!");
}

function showToast(m) {
  const t = document.getElementById('toast'); t.textContent = m; t.className = "toast show";
  setTimeout(() => t.className = "toast", 2500);
}

loadFromSheet();
</script>
</body>
</html>
