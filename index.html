<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ກະດານຕິດຕາມວຽກ — R&D Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#f0ede8;--surface:#faf9f6;--card:#fff;
  --border:#dedad3;--border-lt:#eceae4;
  --text:#1c1a17;--muted:#7a7670;--hint:#b0ada6;
  --accent:#2d6a4f;--accent-lt:#e8f5ee;--accent-bd:#95d5b2;
  --mono:'DM Mono',monospace;--r:10px;--r-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans Lao',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-text{font-size:15px;font-weight:600;}
.sync-bar{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);padding:5px 24px;background:var(--surface);border-bottom:1px solid var(--border-lt);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--hint);}
.sync-dot.ok{background:#3b6d11;}
.sync-dot.loading{background:#854f0b;animation:blink 1s infinite;}
@keyframes blink{50%{opacity:.3;}}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border:1px solid var(--border);border-radius:var(--r);background:var(--card);cursor:pointer;font-size:12px;transition:0.1s;}
.btn-accent{background:var(--accent);color:#fff;border:none;}
.btn-go{background:var(--accent-lt);color:var(--accent);border-color:var(--accent-bd);}
.btn-danger{background:#fff5f5;color:#9b2323;border-color:#fbc8c8;}
.main{max-width:1200px;margin:0 auto;padding:20px 16px;}
.chart-container{padding:20px; background:var(--card); border:1px solid var(--border-lt); border-radius:var(--r-lg); margin-bottom:14px; height: 320px;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px;}
.stat-card{background:var(--card);border:1px solid var(--border-lt);border-radius:var(--r-lg);padding:14px 16px;}
.stat-n{font-size:26px;font-weight:600;font-family:var(--mono);line-height:1;}
.stat-l{font-size:11px;color:var(--muted);margin-top:4px;}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.prog-bar{flex:1;height:4px;background:var(--border);border-radius:999px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);transition:width .4s ease;}
.prog-lbl{font-size:12px;font-weight:500;color:var(--accent);font-family:var(--mono);min-width:34px;}
.panel{background:var(--card);border:1px solid var(--border-lt);border-radius:var(--r-lg);overflow:hidden;margin-bottom:14px;}
.form-grid{display:grid;grid-template-columns:2fr 1.2fr 1fr 1fr 1fr auto;gap:8px;padding:15px;background:var(--card);border-radius:var(--r-lg);border:1px solid var(--border-lt);margin-bottom:14px;align-items:end;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:11px;color:var(--muted);font-weight:600;}
.fg input,.fg select{padding:8px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);outline:none;height:36px;}
.toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:12px;background:var(--card);border-bottom:1px solid var(--border-lt);}
.search-box input{padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);width:220px;}
.date-filter{display:flex;align-items:center;gap:6px;background:var(--surface);padding:4px 10px;border:1px solid var(--border);border-radius:var(--r);}
.date-filter input{border:none;background:transparent;font-size:12px;font-family:var(--mono);outline:none;}
.fp{padding:4px 11px;border:1px solid var(--border);border-radius:999px;font-size:11px;cursor:pointer;background:transparent;color:var(--muted);display:inline-flex;align-items:center;gap:4px;}
.fp.on{background:var(--text);color:#fff;}
.cb{font-size:10px;font-family:var(--mono);background:var(--border);color:var(--muted);padding:1px 5px;border-radius:999px;}
table{width:100%;border-collapse:collapse;background:var(--card);}
th{text-align:left;padding:12px;font-size:10px;color:var(--hint);text-transform:uppercase;border-bottom:1px solid var(--border-lt);background:var(--surface);}
td{padding:12px;border-bottom:1px solid var(--border-lt);vertical-align:middle;}
.badge{padding:3px 9px;border-radius:999px;font-size:11px;font-weight:500;border:1px solid transparent;}
.b-todo{background:#eef4fb;color:#1a4d8f;border-color:#b8d4f5;}
.b-doing{background:#fef5e7;color:#7a4f0a;border-color:#f5d08a;}
.b-done{background:var(--accent-lt);color:var(--accent);border-color:var(--accent-bd);}
.p-h{background:#fff0f0;color:#9b2323;border-color:#f5b8b8;}
.p-m{background:#fef5e7;color:#7a4f0a;border-color:#f5d08a;}
.p-l{background:#eef4fb;color:#1a4d8f;border-color:#b8d4f5;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1c1a17;color:#fff;padding:9px 18px;border-radius:var(--r);font-size:13px;opacity:0;transition:0.3s;z-index:999;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-mark">🚀</div>
    <div class="logo-text">ກະດານຕິດຕາມວຽກ R&D</div>
  </div>
  <button class="btn" onclick="loadFromSheet()">🔄 ໂຫຼດໃໝ່</button>
</header>

<div class="sync-bar">
  <div class="sync-dot" id="sync-dot"></div>
  <span id="sync-text">ລໍຖ້າການເຊື່ອມຕໍ່...</span>
  <span id="sync-time" style="margin-left:auto; font-size:11px; font-family:var(--mono);"></span>
</div>

<main class="main">
  <div class="stats" id="stats-grid"></div>
  <div class="chart-container"><canvas id="performanceChart"></canvas></div>
  
  <div class="prog-row">
    <span style="font-size:11px;color:var(--muted);">ຄວາມຄືບໜ້າລວມ</span>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <span class="prog-lbl" id="prog-pct">0%</span>
  </div>

  <div class="panel">
    <div class="panel-head" style="padding:11px 14px; border-bottom:1px solid var(--border-lt);"><b>ເພີ່ມວຽກໃໝ່</b></div>
    <div class="form-grid">
      <div class="fg"><label>ຊື່ວຽກ *</label><input id="fName" placeholder="ພິມຊື່ວຽກ..."/></div>
      <div class="fg"><label>ຜູ້ຮັບຜິດຊອບ</label><select id="fAssign"><option value="ບໍ່ລະບຸ">-- ເລືອກຜູ້ຮັບຜິດຊອບ --</option></select></div>
      <div class="fg"><label>ວັນທີມອບວຽກ</label><input id="fAssigned" type="date"/></div>
      <div class="fg"><label>ກຳນົດສຳເລັດ</label><input id="fDue" type="date"/></div>
      <div class="fg"><label>ຄວາມສຳຄັນ</label>
        <select id="fPrio">
          <option value="h">ຮີບດ່ວນ</option>
          <option value="m" selected>ປານກາງ</option>
          <option value="l">ຕໍ່າ</option>
        </select>
      </div>
      <button class="btn btn-accent" onclick="addTask()">+ ເພີ່ມ</button>
    </div>
  </div>

  <div class="panel">
    <div class="toolbar">
      <div class="search-box"><input type="text" id="searchInput" oninput="render()" placeholder="🔍 ຄົ້ນຫາ..."/></div>
      <div class="date-filter">
        <input type="date" id="dateStart" onchange="render()"/>
        <span>ຫາ</span>
        <input type="date" id="dateEnd" onchange="render()"/>
      </div>
      <div id="statusFilters" style="display:flex; gap:6px;"></div>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>#</th><th>ຊື່ວຽກ</th><th>ຜູ້ຮັບຜິດຊອບ</th><th>ວັນທີມອບ</th><th>ກຳນົດສຳເລັດ</th><th>ວັນທີສຳເລັດແທ້</th><th>ຄວາມສຳຄັນ</th><th>ສະຖານະ</th><th>ຈັດການ</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// ⚠️ ກະລຸນາປ່ຽນ URL ນີ້ໃຫ້ເປັນ Web App URL ຂອງເຈົ້າ
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw2hiCW0V2AWEJ2BgI2Q7m9TvFX66twqHhedW3wTZKuvUpCY9bu8MHs5a9V0-uRweRUVg/exec";
let tasks = [], users = [], filterSt = 'all', nextId = 1, myChart = null;

const ST_NEXT = {todo:'doing', doing:'done', done:'todo'};
const ST_LABEL = {todo:'ລໍຖ້າ', doing:'ດຳເນີນຢູ່', done:'ສຳເລັດ'};
const ST_CLS = {todo:'b-todo', doing:'b-doing', done:'b-done'};
const MV_LBL = {todo:'▶ ເລີ່ມ', doing:'✓ ແລ້ວ', done:'↺ Reset'};
const PRIO_LABEL = {h:'ຮີບດ່ວນ', m:'ປານກາງ', l:'ຕໍ່າ'}, PRIO_CLS = {h:'p-h', m:'p-m', l:'p-l'};

async function loadFromSheet() {
  document.getElementById('sync-dot').className = 'sync-dot loading';
  try {
    const res = await fetch(SCRIPT_URL + "?t=" + Date.now(), { redirect: 'follow' });
    const data = await res.json();
    tasks = data.tasks.map(t => ({...t, id: Number(t.id)})).filter(t => t.name);
    users = data.users;

    const userSelect = document.getElementById('fAssign');
    userSelect.innerHTML = '<option value="ບໍ່ລະບຸ">-- ເລືອກຜູ້ຮັບຜິດຊອບ --</option>';
    users.forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.name; opt.textContent = u.name;
      userSelect.appendChild(opt);
    });

    document.getElementById('sync-dot').className = 'sync-dot ok';
    document.getElementById('sync-text').textContent = "Sync ສຳເລັດ";
    document.getElementById('sync-time').textContent = new Date().toLocaleTimeString('lo-LA');
    render();
  } catch(e) { 
    document.getElementById('sync-dot').className = 'sync-dot err';
    console.error(e); 
  }
}

function fmtDate(d) {
  if (!d || d === '—' || d === 'Invalid Date') return '—';
  let dateStr = String(d).split('T')[0];
  const parts = dateStr.split('-');
  if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
  const dateObj = new Date(d);
  if (isNaN(dateObj.getTime())) return d;
  return dateObj.toLocaleDateString('lo-LA', {day:'2-digit', month:'2-digit', year:'numeric'});
}

function updateChart() {
  const ctx = document.getElementById('performanceChart').getContext('2d');
  const allUsers = [...new Set(tasks.map(t => t.assignee))];
  const done = allUsers.map(u => tasks.filter(t => t.assignee === u && t.status === 'done').length);
  const pending = allUsers.map(u => tasks.filter(t => t.assignee === u && t.status !== 'done').length);

  if(myChart) myChart.destroy();
  myChart = new Chart(ctx, {
    type: 'bar', data: { labels: allUsers, datasets: [
      { label: 'ວຽກຄ້າງ', data: pending, backgroundColor: '#f5d08a' },
      { label: 'ວຽກສຳເລັດ', data: done, backgroundColor: '#2d6a4f' }
    ]}, options: { responsive: true, maintainAspectRatio: false, scales: { x: {stacked: true}, y: {stacked: true} } }
  });
}

function sendWA(id) {
  const t = tasks.find(x => x.id === id);
  const u = users.find(x => x.name === t.assignee);
  if (!u || !u.phone) return alert("ບໍ່ພົບເບີໂທ WhatsApp ໃນ Sheet2");
  const msg = `ສະບາຍດີ ${t.assignee},\nທ່ານມີວຽກມອບໝາຍໃໝ່:\n📌 ວຽກ: ${t.name}\n📅 Deadline: ${fmtDate(t.due)}\n🚀 ຄວາມສຳຄັນ: ${PRIO_LABEL[t.prio]}`;
  window.open(`https://wa.me/${u.phone}?text=${encodeURIComponent(msg)}`, '_blank');
}

function render() {
  updateChart();
  const q = document.getElementById('searchInput').value.toLowerCase();
  const ds = document.getElementById('dateStart').value, de = document.getElementById('dateEnd').value;
  
  const tot = tasks.length, dn = tasks.filter(t => t.status === 'done').length;
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-n">${tot}</div><div class="stat-l">ວຽກທັງໝົດ</div></div>
    <div class="stat-card" style="color:#7a4f0a"><div class="stat-n">${tasks.filter(t=>t.status==='doing').length}</div><div class="stat-l">ດຳເນີນຢູ່</div></div>
    <div class="stat-card" style="color:var(--accent)"><div class="stat-n">${dn}</div><div class="stat-l">ສຳເລັດ</div></div>`;
  document.getElementById('prog-fill').style.width = (tot ? (dn/tot*100) : 0) + '%';
  document.getElementById('prog-pct').textContent = (tot ? Math.round(dn/tot*100) : 0) + '%';

  const stFilterUI = [['all','ທັງໝົດ',tot], ['todo','ລໍຖ້າ',tasks.filter(t=>t.status==='todo').length], ['doing','ດຳເນີນ',tasks.filter(t=>t.status==='doing').length], ['done','ສຳເລັດ',dn]];
  document.getElementById('statusFilters').innerHTML = stFilterUI.map(([f,l,c]) => `<button class="fp${filterSt===f?' on':''}" onclick="filterSt='${f}';render()">${l}<span class="cb">${c}</span></button>`).join('');

  const vis = tasks.filter(t => {
    const matchSearch = t.name.toLowerCase().includes(q) || t.assignee.toLowerCase().includes(q);
    const matchStatus = filterSt === 'all' || t.status === filterSt;
    let matchDate = true;
    if (ds && de) matchDate = t.assigned >= ds && t.assigned <= de;
    return matchSearch && matchStatus && matchDate;
  });

  document.getElementById('tbody').innerHTML = vis.map((t, i) => `
    <tr>
      <td>${i+1}</td><td><b>${t.name}</b></td><td>${t.assignee}</td>
      <td class="td-due">${fmtDate(t.assigned)}</td><td class="td-due">${fmtDate(t.due)}</td>
      <td class="td-due" style="color:var(--accent)">${fmtDate(t.completed_at)}</td>
      <td><span class="badge ${PRIO_CLS[t.prio]}">${PRIO_LABEL[t.prio]}</span></td>
      <td><span class="badge ${ST_CLS[t.status]}">${ST_LABEL[t.status]}</span></td>
      <td style="display:flex; gap:4px;">
        <button class="btn btn-sm ${t.status==='doing'?'btn-accent':'btn-go'}" onclick="moveTask(${t.id})">${MV_LBL[t.status]}</button>
        <button class="btn btn-sm" onclick="sendWA(${t.id})" style="background:#25D366; color:white; border:none;">WA</button>
        <button class="btn btn-sm btn-danger" onclick="delTask(${t.id})">ລຶບ</button>
      </td>
    </tr>`).join('');
}

async function addTask() {
  const name = document.getElementById('fName').value.trim();
  if(!name) return showToast("ກະລຸນາໃສ່ຊື່ວຽກ!");
  tasks.push({ id: Date.now(), name, assignee: document.getElementById('fAssign').value, assigned: document.getElementById('fAssigned').value, due: document.getElementById('fDue').value, completed_at: '', prio: document.getElementById('fPrio').value, status: 'todo' });
  render(); await saveToSheet(); document.getElementById('fName').value = '';
}

async function moveTask(id) {
  const t = tasks.find(x => x.id === id);
  t.status = ST_NEXT[t.status];
  t.completed_at = t.status === 'done' ? new Date().toISOString().split('T')[0] : '';
  render(); await saveToSheet();
}

async function delTask(id) {
  if(!confirm("ລຶບແທ້ບໍ?")) return;
  tasks = tasks.filter(t => t.id !== id);
  render(); await saveToSheet();
}

async function saveToSheet() {
  await fetch(SCRIPT_URL, { method: 'POST', redirect: 'follow', body: JSON.stringify(tasks) });
  showToast("Sync ສຳເລັດ!");
}

function showToast(m) {
  const t = document.getElementById('toast'); t.textContent = m; t.className = "toast show";
  setTimeout(() => t.className = "toast", 2500);
}

loadFromSheet();
</script>
</body>
</html>
